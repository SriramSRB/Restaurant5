apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant5-app-deployment
  labels:
    project: restaurant 
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      project: restaurant
  template:
    metadata:
      labels:
        project: restaurant
    spec:
      containers:
        - name: restaurant5-container 
          image: sriramsrb/restaurant5-app:latest
          imagePullPolicy: Never
          ports:
            - containePort: 3000

---

apiVersion: v1
kind: Service
metadata:
  name: restaurant5-service 
  labels:
    project: restaurant
spec:
  type: NodePort
  selector:
    project: restaurant
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080